<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Lançamento P3</title>
    <style>
    .form-control {
        border: 2px solid #e9ecef;
        border-radius: 8px;
        padding: 10px;
    }
    .form-control:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
    }
    .card { border-radius: 15px; }
</style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow border-0 p-4">
        <h2 class="mb-4 text-primary">Registrar Ocorrência - P3</h2>
        
        <form method="post">
            {% csrf_token %}
            <input type="date" name="data_servico" class="form-control" required>
            
            {% for cat in categorias %}
            <div class="mt-2">
                <label>{{ cat.nome }}</label>
                <input type="number" name="cat_{{ cat.id }}" value="0" class="form-control">
            </div>
            {% endfor %}
            
            <button type="submit" class="btn btn-primary mt-3">Salvar Registro</button>
        </form>
    </div>
</div>

</body>
</html>
