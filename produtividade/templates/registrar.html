<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Lançamento P3</title>
    <style>
    .form-control {
        border: 2px solid #e9ecef;
        border-radius: 8px;
        padding: 10px;
    }
    .form-control:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
    }
    .card { border-radius: 15px; }
</style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow border-0 p-4">
        <h2 class="mb-4 text-primary">Registrar Ocorrência - P3</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="row g-3">
                {% for field in form %}
                <div class="col-md-4">
                    <label class="form-label fw-bold">{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}
            </div>

            <hr class="my-4">

            <h4 class="text-secondary">Materiais Apreendidos</h4>
            {{ formset.management_form }}
            <div id="formset-container">
                {% for f in formset %}
                <div class="row g-3 mb-2">
                    {% for field in f %}
                    <div class="col-md">
                        {{ field }}
                    </div>
                    {% endfor %}
                </div>
                {% endfor %}
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary btn-lg px-5">Salvar Registro</button>
                <a href="{% url 'produtividade:dashboard' %}" class="btn btn-outline-secondary">Voltar ao Dashboard</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
