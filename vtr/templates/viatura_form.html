<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Viatura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Injeção global rápida de estilo para os campos automáticos do formulário Django */
        input, select, textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            background-color: #f9fafb;
            outline: none;
            transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #2563eb;
            background-color: #ffffff;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 p-6 flex items-center justify-center min-h-screen">
    <div class="bg-white rounded-2xl shadow-md border border-gray-200 max-w-lg w-full overflow-hidden">
        <div class="bg-gray-900 p-4 text-white font-bold text-center uppercase tracking-wide">
            {% if object %}Editar Detalhes do Veículo{% else %}Cadastrar Viatura na Frota{% endif %}
        </div>
        
        <form method="POST" class="p-6 space-y-4">
            {% csrf_token %}
            
            <div class="space-y-3 font-medium text-sm text-gray-700">
                {{ form.as_p }}
            </div>

            <div class="flex justify-end space-x-3 pt-4 border-t border-gray-100">
                <a href="{% url 'vtr:gerenciar_frota' %}" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold text-xs px-4 py-2.5 rounded-lg transition-colors">Cancelar</a>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs px-5 py-2.5 rounded-lg transition-colors shadow">Salvar Dados</button>
            </div>
        </form>
    </div>
</body>
</html>
