<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Exclusão</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 p-6 flex items-center justify-center min-h-screen">
    <div class="bg-white rounded-2xl shadow-lg border border-gray-200 max-w-md w-full p-6 text-center">
        <div class="w-16 h-16 bg-red-100 text-red-600 font-bold text-3xl rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-red-200">!</div>
        <h1 class="text-xl font-bold text-gray-800">Remover do Sistema?</h1>
        <p class="text-sm text-gray-500 mt-2">Você está prestes a excluir permanentemente a viatura prefixo/placa <strong class="font-mono text-gray-900 text-base block my-1">{{ object.placa }}</strong> da base de dados do {{ object.unidade.sigla }}. Essa ação não poderá ser desfeita.</p>
        
        <form method="POST" class="mt-6 flex justify-center space-x-3">
            {% csrf_token %}
            <a href="{% url 'vtr:gerenciar_frota' %}" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold text-xs px-4 py-2.5 rounded-lg transition-colors">Cancelar</a>
            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold text-xs px-4 py-2.5 rounded-lg transition-colors shadow">Confirmar Exclusão</button>
        </form>
    </div>
</body>
</html>
