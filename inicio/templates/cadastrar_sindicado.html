{% extends 'base.html' %}

{% block title %}Cadastrar Sindicado{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="bg-white rounded-lg shadow-md p-6 max-w-2xl mx-auto">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
            Cadastrar Sindicado para Sindicância: {{ sindicancia.numero }}
        </h2>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            {% if form.errors %}
            <div class="bg-red-50 border-l-4 border-red-400 p-4 mb-4">
                <div class="text-sm text-red-700">
                    {{ form.errors }}
                </div>
            </div>
            {% endif %}

            <div class="form-style-container">
                {{ form.as_p }}
            </div>

            <div class="border-t border-gray-200 pt-6 mt-6 flex justify-end space-x-3">
                <button type="button" onclick="window.history.back()" 
                        class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Cancelar
                </button>
                <button type="submit" 
                        class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Cadastrar
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    /* Estilização para manter o padrão visual nos campos gerados pelo .as_p */
    .form-style-container p {
        margin-bottom: 1rem;
    }
    
    .form-style-container label {
        display: block;
        font-size: 0.875rem;
        font-medium: 500;
        color: #374151; /* gray-700 */
        margin-bottom: 0.25rem;
    }
    
    .form-style-container input, 
    .form-style-container select, 
    .form-style-container textarea {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }

    .form-style-container input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
</style>
{% endblock %}
