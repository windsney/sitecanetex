{% extends 'base.html' %}

{% block title %}Cadastrar Notificação{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="bg-white rounded-lg shadow-md p-6 max-w-lg mx-auto mt-10">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">
            Cadastrar Notificação
        </h1>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div class="django-form-container">
                {{ form.as_p }}
            </div>

            <div class="pt-4 flex flex-col space-y-3">
                <button type="submit" 
                        class="w-full px-6 py-3 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Gerar Notificação
                </button>
                
                <button type="button" 
                        onclick="window.history.back()" 
                        class="w-full px-6 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition-colors text-center">
                    Voltar
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    /* Estiliza os campos gerados pelo Django {{ form.as_p }} */
    .django-form-container p {
        margin-bottom: 1.25rem;
    }

    .django-form-container label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #374151; /* gray-700 */
        margin-bottom: 0.35rem;
    }

    .django-form-container input, 
    .django-form-container select, 
    .django-form-container textarea {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid #d1d5db; /* gray-300 */
        border-radius: 0.375rem;
        background-color: #f9fafb; /* gray-50 */
        color: #111827;
        transition: all 0.2s ease;
    }

    .django-form-container input:focus, 
    .django-form-container select:focus {
        outline: none;
        border-color: #2563eb; /* blue-600 */
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        background-color: #fff;
    }

    /* Ajuste para checkboxes, caso existam no formulário */
    .django-form-container input[type="checkbox"] {
        width: auto;
        margin-right: 0.5rem;
    }
</style>
{% endblock %}
